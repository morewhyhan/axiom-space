<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="light">
  <meta name="description" content="AXIOM Space A3 黄金案例：15 个连续产品演示单元">
  <title>AXIOM Space｜让掌握可见、可积累、可继续</title>
  <link rel="stylesheet" href="v18-deck.css?v=20260717l">
</head>
<body class="director">
  <main id="deck" class="deck v18-deck" aria-label="AXIOM Space A3 黄金案例 V18 演示"></main>

  <nav class="controls" aria-label="演示控制">
    <button id="prevBtn" type="button" aria-label="上一页" title="上一页（←）">←</button>
    <span id="pageCounter" aria-live="polite">01 / 15</span>
    <button id="nextBtn" type="button" aria-label="下一页" title="下一页（→）">→</button>
    <button id="playBtn" type="button" aria-label="播放当前实录" title="播放或暂停当前实录（P）" aria-pressed="false">播放</button>
    <button id="notesBtn" type="button" aria-label="查看本页口播" title="查看本页口播（N）" aria-pressed="false">口播</button>
    <button id="directorBtn" type="button" aria-label="切换导演信息" title="切换导演/成片视图（D）" aria-pressed="true">导演</button>
    <button id="fullscreenBtn" type="button" aria-label="全屏" title="全屏（F）">全屏</button>
  </nav>

  <div class="progress" role="progressbar" aria-label="演示进度" aria-valuemin="1" aria-valuemax="15" aria-valuenow="1">
    <i id="progressFill"></i>
  </div>

  <aside class="notes-panel" id="notesPanel" aria-hidden="true" aria-label="本页导演稿">
    <div>
      <span>本页导演稿</span>
      <button id="closeNotes" type="button" aria-label="关闭口播面板">×</button>
    </div>
    <h2 id="notesTitle"></h2>
    <p id="notesNarration"></p>
    <ol id="notesBeats"></ol>
  </aside>

  <noscript>请启用 JavaScript 以查看 AXIOM Space 演示。</noscript>
  <script type="module" src="v18-deck.js?v=20260717l"></script>
</body>
</html>
